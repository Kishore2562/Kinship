<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B1F3A">
<link rel="apple-touch-icon" href="icon-192.png">

<title>Parent Dashboard</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<script>
if (!localStorage.getItem("user_id")) {
    window.location.href = "index.html";
}
</script>

<!-- Notification -->
<div id="notification" class="notification"></div>
<audio id="notifSound" src="notify.mp3"></audio>

<!-- TOP BAR -->
<div class="top-bar">

    <div class="user-info">
        <span id="userName">User</span><br>
        <small id="userRole">Parent</small>
    </div>

    <img
        id="profileIcon"
        src="default.png"
        onclick="openProfile()"
    >

</div>

<h2>👨‍👩‍👦 Parent Dashboard</h2>

<!-- STATUS -->
<div class="card">
    <h3>📍 Student Status</h3>

    <p id="status">Loading...</p>
    <p id="time"></p>

    <button onclick="loadCheckin()">
        Refresh Status
    </button>
</div>

<!-- SOS -->
<div class="card sos-card">

    <h3>🚨 Last SOS</h3>

    <div id="lastSosUser" class="sos-user">
        No SOS
    </div>

    <div id="lastSosTime" class="sos-time"></div>

    <button onclick="viewSOSHistory()">
        View History
    </button>

</div>

<!-- RELATIONSHIP -->
<div class="card">

    <h3>❤️ Relationship Bond</h3>

    <div class="bond-bar">
        <div id="bondFill"></div>
    </div>

    <p id="bondPercent">0%</p>

</div>

<!-- PAIR -->
<div class="card" id="pairSection">

    <h3>🔗 Connect With Student</h3>

    <input
        type="text"
        id="pairCodeInput"
        placeholder="Enter Pair Code"
    >

    <button
        id="connectBtn"
        onclick="connectWithCode()"
    >
        Connect
    </button>

    <p id="statusText"></p>

</div>

<!-- SOS POPUP -->
<div
    id="sosBox"
    class="card"
    style="display:none;"
>

    <p id="sosText"></p>

    <button
        class="sos-btn"
        onclick="stopAlarm()"
    >
        Stop Alarm
    </button>

</div>

<!-- ACTIONS -->
<div class="card">

    <button onclick="openChat()">
        💬 Open Chat
    </button>

    <button onclick="openPuzzle()">
        🧩 Open Puzzle
    </button>

    <button onclick="openProfile()">
        👤 Profile
    </button>

    <button onclick="logout()">
        🚪 Logout
    </button>

</div>

<audio id="alarmSound" src="alarm.mp3"></audio>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="utils.js"></script>
<script type="module" src="parent.js"></script>

</body>
</html>
