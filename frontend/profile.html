<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0B1F3A">

<link rel="apple-touch-icon" href="icon-192.png">
    <title>Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<script>
if (!sessionStorage.getItem("kinship_unlocked")) {
    sessionStorage.setItem("kinship_target", window.location.href);
    window.location.href = "index.html";
}
</script>

<div class="container">

<h2> Profile</h2>

<img id="profileImage" src="default.png" width="120">

<br><br>

<input type="text" id="nameInput" placeholder="Enter Name">
<input type="text" id="phoneInput" placeholder="Enter Phone">
<input type="text" id="roleDisplay" readonly>

<br><br>

<input type="file" id="photoInput">

<br><br>

<button id="saveProfileBtn">Save</button>
<button onclick="goBack()">Back</button>

</div>

<script src="profile.js"></script>

<script>
function goBack() {
    const role = sessionStorage.getItem("role");

    if (role === "parent") {
        window.location.href = "parent.html";
    } else {
        window.location.href = "student.html";
    }
}
</script>



</body>
</html>
