<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kinship – Secure Access</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="pin-page">

<div class="container">

<select id="role">
  <option value="student">Student</option>
  <option value="parent">Parent</option>
</select>

<h2>Secure Access</h2>

<p id="infoText"></p>

<input type="password"
       id="pinInput"
       maxlength="4"
       placeholder="Enter 4-digit PIN">

<button onclick="handlePin()">
    Continue
</button>

<p id="error" style="color:red;"></p>

<button
    id="switchBtn"
    onclick="resetApp()"
    style="display:none;">
    Switch User
</button>

</div>

<script src="pin.js"></script>
</body>
</html>
